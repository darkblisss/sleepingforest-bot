name: Donations Alert

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pynacl
      - run: python donations_alert.py
        env:
          DEGEN_REFRESH_TOKEN: ${{ secrets.DEGEN_REFRESH_TOKEN }}
          DONATIONS_WEBHOOK_URL: ${{ secrets.DONATIONS_WEBHOOK_URL }}
