name: Worldboss Alert

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pynacl
      - run: python worldboss_alert.py
        env:
          DEGEN_REFRESH_TOKEN: ${{ secrets.DEGEN_REFRESH_TOKEN }}
          WORLDBOSS_WEBHOOK_URL: ${{ secrets.WORLDBOSS_WEBHOOK_URL }}
